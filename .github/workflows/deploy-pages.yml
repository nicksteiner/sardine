name: Deploy to GitHub Pages

# Publishes the Vite build (app/ → dist/) to GitHub Pages.
#
# Auto-deploys on push to main. Manually dispatchable from any branch
# via the Actions tab → "Deploy to GitHub Pages" → "Run workflow",
# which is handy for testing a feature branch before merging.
#
# Prereq: repo Settings → Pages → Source = "GitHub Actions".
#
# App URL: https://<owner>.github.io/<repo>/
# (works because vite.config.js sets base: './', so asset paths are relative)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; don't cancel an in-flight production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build site
        run: npm run build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
