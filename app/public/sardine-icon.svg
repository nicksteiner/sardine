<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Background (iOS auto-masks to rounded square) -->
  <rect width="512" height="512" fill="#0a1628"/>

  <!-- Radar arcs: concentric sweeps, cyan fading out -->
  <g fill="none" stroke="#4ec9d4" stroke-linecap="round">
    <circle cx="256" cy="256" r="200" stroke-width="2" stroke-opacity="0.08"/>
    <circle cx="256" cy="256" r="160" stroke-width="2" stroke-opacity="0.12"/>
    <circle cx="256" cy="256" r="120" stroke-width="2" stroke-opacity="0.18"/>
    <circle cx="256" cy="256" r="80"  stroke-width="2" stroke-opacity="0.25"/>
  </g>

  <!-- Radar sweep line -->
  <line x1="256" y1="256" x2="456" y2="256"
        stroke="#4ec9d4" stroke-width="3" stroke-opacity="0.5" stroke-linecap="round"/>

  <!-- Central dot (radar origin) -->
  <circle cx="256" cy="256" r="6" fill="#4ec9d4"/>

  <!-- Wordmark: SARdine -->
  <text x="256" y="340" text-anchor="middle"
        font-family="'JetBrains Mono','SF Mono','Consolas',monospace"
        font-size="86" font-weight="700" letter-spacing="-3">
    <tspan fill="#4ec9d4">SAR</tspan><tspan fill="#e8edf5">dine</tspan>
  </text>
</svg>
